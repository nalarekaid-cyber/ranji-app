<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranji - Jaringan Komunikasi Sesuku Minangkabau</title>
    <!-- Firebase Core & Database SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --cyber-dark: #0b0c10;
            --chat-bg: #1f2833;
            --minang-gold: #c5a059;
            --minang-red: #8b0000;
            --text-light: #c5c6c7;
            --text-white: #ffffff;
            --online-green: #4caf50;
        }
        body {
            background-color: var(--cyber-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            background-color: var(--cyber-dark);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .screen { display: none; flex-direction: column; flex: 1; height: 100%; overflow-y: auto; }
        .screen.active { display: flex; }

        /* HEADER STYLING */
        .app-header {
            background: linear-gradient(135deg, #111, #1a1a1a);
            padding: 16px;
            border-bottom: 2px solid var(--minang-gold);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .app-title { font-size: 20px; font-weight: 800; color: var(--minang-gold); letter-spacing: 1px; }
        .app-subtitle { font-size: 10px; color: #888; text-transform: uppercase; }

        /* FORM INPUT PROFIL */
        #screen-login { padding: 30px 20px; justify-content: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; text-transform: uppercase; color: var(--minang-gold); margin-bottom: 8px; font-weight: 600; }
        .form-control {
            width: 100%; background-color: rgba(255,255,255,0.05); border: 1px solid #333;
            padding: 12px; border-radius: 8px; color: var(--text-white); font-size: 14px; outline: none;
        }
        .form-control:focus { border-color: var(--minang-gold); }
        .btn-submit {
            background: linear-gradient(135deg, var(--minang-red), #5a0000); border: 1px solid var(--minang-gold);
            color: var(--text-white); padding: 14px; border-radius: 8px; font-weight: bold; font-size: 14px;
            cursor: pointer; width: 100%; text-transform: uppercase;
        }

        /* DASHBOARD & DIREKTORI CHAT */
        .info-box { background: #11141a; padding: 14px; border-bottom: 1px solid #222; text-align: center; }
        .section-title { font-size: 11px; text-transform: uppercase; color: var(--minang-gold); padding: 12px 16px 4px; font-weight: bold; }
        
        /* TOMBOL KEMBARAN LINK RESONA APP */
        .resona-bridge-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: linear-gradient(135deg, #1f1a3a, #0b0c10);
            border: 1px solid #6f42c1; box-shadow: 0 0 10px rgba(111, 66, 193, 0.3);
            margin: 12px 16px 4px 16px; padding: 12px; border-radius: 8px;
            text-decoration: none; color: #fff; font-weight: bold; font-size: 13px;
            transition: 0.3s ease;
        }
        .resona-bridge-btn:hover {
            box-shadow: 0 0 15px rgba(111, 66, 193, 0.6);
            border-color: #a07aff;
        }

        .btn-room {
            background: linear-gradient(135deg, #161f2b, #121922); border: 1px solid rgba(197,160,89,0.3); padding: 16px;
            margin: 12px 16px; border-radius: 10px; cursor: pointer;
        }
        .chat-list { flex: 1; padding: 4px 0; }
        .chat-item {
            display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer;
        }
        .chat-item:hover { background-color: rgba(255,255,255,0.02); }
        .avatar {
            width: 44px; height: 44px; border-radius: 50%; background-color: #2c3540;
            display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 12px; position: relative;
        }
        .avatar.online::after {
            content: ''; position: absolute; width: 10px; height: 10px; background-color: var(--online-green); border: 2px solid var(--cyber-dark); border-radius: 50%; bottom: 1px; right: 1px;
        }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .chat-name { color: var(--text-white); font-weight: 600; font-size: 14px; }
        .chat-status-badge { font-size: 10px; color: #44bbff; background: rgba(68,187,255,0.1); padding: 2px 6px; border-radius: 4px; }
        .chat-status-badge.kampung { color: var(--minang-gold); background: rgba(197,160,89,0.1); }

        /* PRIVATE CHAT INTERFACE */
        .chat-room-header { background-color: #161a22; padding: 12px 16px; display: flex; align-items: center; border-bottom: 1px solid #222; }
        .btn-back-chat { background: none; border: none; color: var(--minang-gold); font-size: 20px; cursor: pointer; margin-right: 12px; }
        .header-actions { display: flex; gap: 16px; margin-left: auto; }
        .action-icon-btn { background: none; border: none; color: var(--minang-gold); font-size: 18px; cursor: pointer; padding: 4px; }
        .message-area { flex: 1; background-color: #0f1115; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
        .msg-sender { font-size: 10px; color: var(--minang-gold); font-weight: bold; margin-bottom: 2px; }
        .msg-bubble.incoming { background-color: var(--chat-bg); color: var(--text-white); align-self: flex-start; border-top-left-radius: 2px; }
        .msg-bubble.outgoing { background-color: #4a3b1a; border: 1px solid var(--minang-gold); color: var(--text-white); align-self: flex-end; border-top-right-radius: 2px; }
        .msg-time { font-size: 9px; color: rgba(255,255,255,0.3); text-align: right; margin-top: 4px; }
        .input-bar { background-color: #161a22; padding: 12px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #222; }
        .input-bar input { flex: 1; background-color: var(--cyber-dark); border: 1px solid #333; padding: 12px; border-radius: 24px; color: #fff; outline: none; font-size: 14px; }
        .btn-send { width: 44px; height: 44px; background-color: var(--minang-red); border: 1px solid var(--minang-gold); border-radius: 50%; color: #fff; cursor: pointer; font-size: 15px; }

        /* OVERLAY PANEL PANGGILAN CALL / VCALL */
        .call-overlay {
            position: absolute; inset: 0; background: linear-gradient(180deg, #11141a 0%, #050508 100%);
            z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: space-between; padding: 60px 20px;
        }
        .call-overlay.active { display: flex; }
        .call-info { text-align: center; }
        .call-avatar { width: 100px; height: 100px; background-color: var(--chat-bg); border: 2px solid var(--minang-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 44px; margin: 0 auto 20px; }
        .call-name { font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 8px; }
        .call-status { font-size: 13px; color: var(--minang-gold); text-transform: uppercase; letter-spacing: 1px; }
        .video-canvas-sim { width: 85%; aspect-ratio: 3/4; background-color: #1f2833; border: 1px dashed var(--minang-gold); border-radius: 12px; margin: 20px 0; display: none; align-items: center; justify-content: center; font-size: 12px; color: #888; position: relative; overflow: hidden; }
        .btn-end-call { width: 60px; height: 60px; background-color: #ff3333; border: none; border-radius: 50%; color: #fff; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,51,51,0.4); }
    </style>
</head>
<body>

<div class="app-container">
    <!-- SCREEN 1: REGISTER/LOGIN PROFIL -->
    <div id="screen-login" class="screen active">
        <div class="welcome-text" style="text-align:center; margin-bottom:25px;">
            <h2 style="color:#fff; font-size:24px; font-weight:800; letter-spacing:1px;">RANJI SIBER</h2>
            <p style="color:#888; font-size:12px; text-transform:uppercase; margin-top:4px;">WhatsApp Khusus Sanak Minangkabau</p>
        </div>
        <div class="form-group">
            <label>Namo Sanak / Garih</label>
            <input type="text" id="user-name" class="form-control" placeholder="Contoh: Ikbal Perkasa">
        </div>
        <div class="form-group">
            <label>Suku Minangkabau</label>
            <select id="user-suku" class="form-control">
                <option value="Chaniago">Chaniago</option>
                <option value="Koto">Koto</option>
                <option value="Piliang">Piliang</option>
                <option value="Bodi">Bodi</option>
                <option value="Melayu">Melayu</option>
                <option value="Jambak">Jambak</option>
                <option value="Sikumbang">Sikumbang</option>
            </select>
        </div>
        <div class="form-group">
            <label>Posisi Sanak Kini</label>
            <select id="user-posisi" class="form-control">
                <option value="Kampung">🏡 Di Kampuang Halaman</option>
                <option value="Rantau">✈ Di Parantauan</option>
            </select>
        </div>
        <button class="btn-submit" onclick="loginKeRanjiServer()">Daftar Masuk Jaringan ➔</button>
    </div>

    <!-- SCREEN 2: DASHBOARD UTAMA & DIREKTORI CHAT -->
    <div id="screen-dashboard" class="screen">
        <header class="app-header">
            <div>
                <h1 class="app-title">ranji.</h1>
                <p class="app-subtitle" id="lbl-user-suku">Klan Room</p>
            </div>
        </header>
        <div class="info-box">
            <p style="font-size:13px; color:#fff;">Dunsanak Aktif: <span id="lbl-user-nama" style="color:var(--minang-gold); font-weight:bold;">-</span></p>
        </div>
        
        <!-- JEMBATAN LINK MENUJU KEMBARAN: RESONA APP -->
        <a href="https://nalarekaid-cyber.github.io/resona-app/" target="_blank" class="resona-bridge-btn">
            <span>🔮 Cek Frekuensi Batin di Resona.app ➔</span>
        </a>

        <!-- Saluran Umum Balai Adat Suku -->
        <div class="section-title">Balai Musyawarah Adat</div>
        <div id="balai-adat-container"></div>

        <!-- Saluran Japri / Chat Pribadi -->
        <div class="section-title">Obrolan Pribadi (Japri Badunsanak)</div>
        <div class="chat-list" id="direktori-dunsanak"></div>
    </div>

    <!-- SCREEN 3: INTERFACE ROOM CHAT (UMUM & PRIVAT) -->
    <div id="screen-chat" class="screen">
        <div class="chat-room-header">
            <button class="btn-back-chat" onclick="keluarKeDashboard()">🡨</button>
            <div class="avatar online" id="chat-header-avatar" style="width:34px; height:34px; font-size:14px;">👨</div>
            <div class="chat-info" style="margin-left: 8px;">
                <div class="chat-room-title" id="chat-room-title">Nama Target</div>
                <div id="chat-room-status" style="color:var(--online-green); font-size:11px;">● Aktif</div>
            </div>
            <!-- Tombol Aksi WhatsApp Premium: Call & Video Call -->
            <div class="header-actions" id="chat-header-actions">
                <button class="action-icon-btn" onclick="inisialisasiPanggilan('Voice Call')">📞</button>
                <button class="action-icon-btn" onclick="inisialisasiPanggilan('Video Call')">📹</button>
            </div>
        </div>
        <div class="message-area" id="message-container"></div>
        <div class="input-bar">
            <input type="text" id="input-chat-text" placeholder="Ketik pasan badunsanak...">
            <button class="btn-send" onclick="kirimPesanKeDatabase()">➔</button>
        </div>
    </div>

    <!-- LAYAR OVERLAY PANGGILAN (CALL / VCALL INTERFACE) -->
    <div class="call-overlay" id="call-panel">
        <div class="call-info">
            <div class="call-avatar" id="call-panel-avatar">👨</div>
            <div class="call-name" id="call-panel-name">Dunsanak Target</div>
            <div class="call-status" id="call-panel-type">Voice Calling...</div>
            <div id="call-timer" style="font-family:monospace; font-size:14px; color:#fff; margin-top:8px; display:none;">00:00</div>
        </div>
        
        <!-- Kamera Simulasi untuk Video Call -->
        <div class="video-canvas-sim" id="video-sim-frame">
            <div style="position:absolute; bottom:10px; right:10px; width:70px; height:100px; background:#111; border:1px solid #fff; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:8px;">Kamera Lo</div>
            📱 Kamera Dunsanak Aktif
        </div>

        <button class="btn-end-call" onclick="akhiriPanggilan()">📴</button>
    </div>
</div>

<script>
    // Server Cloud Database Sinkronisasi Chat
    const firebaseConfig = { databaseURL: "https://ranji-siber-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let myProfile = { nama: "", suku: "", lokasi: "" };
    let currentChatMode = "group";
    let currentRoomNodePath = "";
    let callTimerInterval = null;

    const listDunsanakTerdaftar = [
        { nama: "Uda Sutan Koto", suku: "Koto", lokasi: "Kampung", kota: "Bukittinggi", avatar: "👳" },
        { nama: "Rian Chaniago", suku: "Chaniago", lokasi: "Rantau", kota: "Jakarta", avatar: "👨" },
        { nama: "Fitri Piliang", suku: "Piliang", lokasi: "Rantau", kota: "Bandung", avatar: "👩" },
        { nama: "Ajo Hendra Bodi", suku: "Bodi", lokasi: "Kampung", kota: "Padang", avatar: "🧔" },
        { nama: "Dewi Melayu", suku: "Melayu", lokasi: "Rantau", kota: "Medan", avatar: "👩" }
    ];

    function loginKeRanjiServer() {
        const namaInput = document.getElementById('user-name').value.trim();
        if(!namaInput) { alert("Sia namo sanak? Isi dulu!"); return; }

        myProfile.nama = namaInput;
        myProfile.suku = document.getElementById('user-suku').value;
        myProfile.lokasi = document.getElementById('user-posisi').value;

        document.getElementById('lbl-user-nama').innerText = `${myProfile.nama}`;
        document.getElementById('lbl-user-suku').innerText = `Suku ${myProfile.suku.toUpperCase()}`;

        const balaiContainer = document.getElementById('balai-adat-container');
        balaiContainer.innerHTML = `
            <div class="btn-room" onclick="bukaKamarGrupSuku('${myProfile.suku}')">
                <div style="color:#fff; font-weight:bold; font-size:15px;">🏛️ Balai Gadang Suku ${myProfile.suku}</div>
                <div style="font-size:12px; color:var(--minang-gold); margin-top:2px;">Kamar musyawarah terbuka sesuku.</div>
            </div>
        `;

        gantiScreenKe('screen-dashboard');
        renderDaftarDunsanakPrivat();
    }

    function renderDaftarDunsanakPrivat() {
        const container = document.getElementById('direktori-dunsanak');
        container.innerHTML = "";

        listDunsanakTerdaftar.forEach(d => {
            if(d.nama === myProfile.nama) return;

            const item = document.createElement('div');
            item.className = 'chat-item';
            item.onclick = () => bukaKamarChatPrivat(d);

            item.innerHTML = `
                <div class="avatar online">${d.avatar}</div>
                <div class="chat-info">
                    <div class="chat-name-row">
                        <div class="chat-name">${d.nama} ${d.suku === myProfile.suku ? '<span style="color:var(--minang-gold); font-size:11px;">(Badunsanak)</span>' : ''}</div>
                        <span class="chat-status-badge ${d.lokasi.toLowerCase()}">${d.lokasi === 'Rantau' ? '✈ '+d.kota : '🏡 Kampung'}</span>
                    </div>
                    <div style="font-size:12px; color:#888;">Suku Keturunan: ${d.suku}</div>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function bukaKamarGrupSuku(suku) {
        currentChatMode = "group";
        currentRoomNodePath = 'rooms/grup_' + suku;
        
        document.getElementById('chat-header-avatar').innerText = "🏛️";
        document.getElementById('chat-room-title').innerText = `Balai Suku ${suku}`;
        document.getElementById('chat-room-status').innerText = "Ruang Musyawarah Publik";
        document.getElementById('chat-header-actions').style.display = "none";

        sambungkanPipaRealtimeDatabase();
    }

    function bukaKamarChatPrivat(dunsanakTarget) {
        currentChatMode = "private";
        const pathID = [myProfile.nama, dunsanakTarget.nama].sort().join('_').replace(/[^a-zA-Z0-9_]/g, '');
        currentRoomNodePath = 'rooms/privat_' + pathID;

        document.getElementById('chat-header-avatar').innerText = dunsanakTarget.avatar;
        document.getElementById('chat-room-title').innerText = dunsanakTarget.nama;
        document.getElementById('chat-room-status').innerText = `Suku ${dunsanakTarget.suku} · Online`;
        document.getElementById('chat-header-actions').style.display = "flex";

        sambungkanPipaRealtimeDatabase();
    }

    function sambungkanPipaRealtimeDatabase() {
        const container = document.getElementById('message-container');
        container.innerHTML = "";

        const ref = database.ref(currentRoomNodePath);
        ref.off();
        ref.limitToLast(40).on('child_added', (snap) => {
            const msg = snap.val();
            const isMe = msg.sender === myProfile.nama;

            const bubble = document.createElement('div');
            bubble.className = `msg-bubble ${isMe ? 'outgoing' : 'incoming'}`;
            bubble.innerHTML = `
                <div class="msg-sender">${isMe ? 'Ambo' : msg.sender} (${msg.lokasi})</div>
                <div>${msg.text}</div>
                <div class="msg-time">${msg.time}</div>
            `;
            container.appendChild(bubble);
            container.scrollTop = container.scrollHeight;
        });

        gantiScreenKe('screen-chat');
    }

    function kirimPesanKeDatabase() {
        const input = document.getElementById('input-chat-text');
        const text = input.value.trim();
        if(!text) return;

        const timeString = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

        database.ref(currentRoomNodePath).push({
            sender: myProfile.nama,
            lokasi: myProfile.lokasi,
            text: text,
            time: timeString
        });

        input.value = "";
    }

    function inisialisasiPanggilan(tipe) {
        const targetNama = document.getElementById('chat-room-title').innerText;
        const targetAvatar = document.getElementById('chat-header-avatar').innerText;

        document.getElementById('call-panel-name').innerText = targetNama;
        document.getElementById('call-panel-avatar').innerText = targetAvatar;
        document.getElementById('call-panel-type').innerText = `${tipe} Berdering...`;
        
        const videoFrame = document.getElementById('video-sim-frame');
        if(tipe === "Video Call") {
            videoFrame.style.display = "flex";
        } else {
            videoFrame.style.display = "none";
        }

        document.getElementById('call-panel').classList.add('active');

        setTimeout(() => {
            document.getElementById('call-panel-type').innerText = `${tipe} Terhubung`;
            const timerLabel = document.getElementById('call-timer');
            timerLabel.style.display = "block";
            
            let detik = 0;
            clearInterval(callTimerInterval);
            callTimerInterval = setInterval(() => {
                detik++;
                const m = String(Math.floor(detik / 60)).padStart(2, '0');
                const s = String(detik % 60).padStart(2, '0');
                timerLabel.innerText = `${m}:${s}`;
            }, 1000);
        }, 2000);
    }

    function akhiriPanggilan() {
        clearInterval(callTimerInterval);
        document.getElementById('call-timer').style.display = "none";
        document.getElementById('call-timer').innerText = "00:00";
        document.getElementById('call-panel').classList.remove('active');
    }

    function keluarKeDashboard() {
        database.ref(currentRoomNodePath).off();
        gantiScreenKe('screen-dashboard');
    }

    function gantiScreenKe(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
