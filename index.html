<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranji - Hubungan Sesuku Minangkabau</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --cyber-dark: #0b0c10;
            --chat-bg: #1f2833;
            --minang-gold: #c5a059;
            --minang-red: #8b0000;
            --text-light: #c5c6c7;
            --text-white: #ffffff;
            --online-green: #4caf50;
        }
        body {
            background-color: var(--cyber-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        /* Penataan Aplikasi Berbasis Layar HP (APK Screen) */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            background-color: var(--cyber-dark);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .screen {
            display: none;
            flex-direction: column;
            flex: 1;
            height: 100%;
            overflow-y: auto;
        }
        .screen.active { display: flex; }

        /* HEADER UTAMA */
        .app-header {
            background: linear-gradient(135deg, #111, #1a1a1a);
            padding: 16px;
            border-bottom: 2px solid var(--minang-gold);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-title-block { display: flex; align-items: center; gap: 10px; }
        .app-logo-placeholder {
            width: 36px;
            height: 36px;
            background: var(--minang-red);
            border: 1px solid var(--minang-gold);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .app-title { font-size: 20px; font-weight: 800; color: var(--minang-gold); letter-spacing: 1px; }
        .app-subtitle { font-size: 10px; color: #888; text-transform: uppercase; }

        /* SCREEN 1: LOGIN / REGISTER PROFILE */
        #screen-login { padding: 30px 20px; justify-content: center; }
        .welcome-text { text-align: center; margin-bottom: 30px; }
        .welcome-text h2 { color: var(--text-white); font-size: 24px; margin-bottom: 8px; }
        .welcome-text p { font-size: 13px; color: #888; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; text-transform: uppercase; color: var(--minang-gold); margin-bottom: 8px; font-weight: 600; }
        .form-control {
            width: 100%;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid #333;
            padding: 12px;
            border-radius: 8px;
            color: var(--text-white);
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-control:focus { border-color: var(--minang-gold); }
        select.form-control option { background-color: var(--cyber-dark); color: var(--text-white); }
        .btn-submit {
            background: linear-gradient(135deg, var(--minang-red), #5a0000);
            border: 1px solid var(--minang-gold);
            color: var(--text-white);
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* SCREEN 2: DASHBOARD UTAMA */
        .filter-section {
            background-color: #11141a;
            padding: 12px 16px;
            border-bottom: 1px solid #222;
        }
        .filter-label { font-size: 11px; text-transform: uppercase; color: var(--minang-gold); margin-bottom: 6px; font-weight: bold; }
        .chat-list { flex: 1; padding: 8px 0; }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-item:not(.header-item):hover { background-color: rgba(255,255,255,0.03); }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #2c3540;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            position: relative;
            margin-right: 14px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .avatar.online::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: var(--online-green);
            border: 2px solid var(--cyber-dark);
            border-radius: 50%;
            bottom: 2px;
            right: 2px;
        }
        .chat-info { flex: 1; }
        .chat-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .chat-name { color: var(--text-white); font-weight: 600; font-size: 15px; }
        .chat-meta { font-size: 11px; color: var(--minang-gold); background-color: rgba(197,160,89,0.1); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .chat-msg-preview { font-size: 13px; color: #8e9297; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }
        .chat-status-badge { font-size: 11px; color: #ff5555; }
        .chat-status-badge.rantau { color: #44bbff; }

        /* SCREEN 3: ROOM CHAT PERSONAL */
        .chat-room-header {
            background-color: #161a22;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        .btn-back-chat {
            background: none; border: none; color: var(--minang-gold); font-size: 20px; cursor: pointer; margin-right: 12px; padding: 4px;
        }
        .chat-room-meta { flex: 1; }
        .chat-room-title { color: var(--text-white); font-weight: 600; font-size: 15px; }
        .chat-room-sub { font-size: 11px; color: var(--online-green); }
        .message-area {
            flex: 1; background-color: #11141a; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
        }
        .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; position: relative; }
        .msg-bubble.incoming {
            background-color: var(--chat-bg); color: var(--text-white); align-self: flex-start; border-top-left-radius: 2px;
        }
        .msg-bubble.outgoing {
            background-color: #4a3b1a; border: 1px solid var(--minang-gold); color: var(--text-white); align-self: flex-end; border-top-right-radius: 2px;
        }
        .msg-time { font-size: 10px; color: rgba(255,255,255,0.4); text-align: right; margin-top: 4px; font-family: monospace; }
        .input-bar {
            background-color: #161a22; padding: 12px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #222;
        }
        .input-bar input {
            flex: 1; background-color: var(--cyber-dark); border: 1px solid #333; padding: 12px; border-radius: 24px; color: #fff; outline: none; font-size: 14px;
        }
        .btn-send {
            width: 44px; height: 44px; background-color: var(--minang-red); border: 1px solid var(--minang-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; font-size: 16px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- SCREEN 1: FORM INPUT PROFIL (LOGIN) -->
    <div id="screen-login" class="screen active">
        <div class="welcome-text">
            <div class="app-logo-placeholder" style="margin: 0 auto 12px;">👑</div>
            <h2>RANJI SIBER</h2>
            <p>Taruko Jariang Silaturahmi Urang Sesuku</p>
        </div>
        <div class="form-group">
            <label>Nama Lengkap / Garih</label>
            <input type="text" id="user-name" class="form-control" placeholder="Contoh: Ikbal Perkasa">
        </div>
        <div class="form-group">
            <label>Suku Minangkabau Lo</label>
            <select id="user-suku" class="form-control">
                <option value="Chaniago">Chaniago</option>
                <option value="Koto">Koto</option>
                <option value="Piliang">Piliang</option>
                <option value="Bodi">Bodi</option>
                <option value="Melayu">Melayu</option>
                <option value="Jambak">Jambak</option>
                <option value="Sikumbang">Sikumbang</option>
            </select>
        </div>
        <div class="form-group">
            <label>Posisi Kini</label>
            <select id="user-posisi" class="form-control">
                <option value="Kampung">Di Kampuang Halaman</option>
                <option value="Rantau">Di Parantauan</option>
            </select>
        </div>
        <button class="btn-submit" onclick="masukDashboard()">Masuk Ranji Jaringan ➔</button>
    </div>

    <!-- SCREEN 2: DASHBOARD UTAMA (DIREKTORI DUNSANAK SESUKU) -->
    <div id="screen-dashboard" class="screen">
        <header class="app-header">
            <div class="header-title-block">
                <div class="app-logo-placeholder">👑</div>
                <div>
                    <h1 class="app-title">ranji.</h1>
                    <p class="app-subtitle" id="user-profile-subtitle">SUKU: KOTO</p>
                </div>
            </div>
        </header>
        <div class="filter-section">
            <div class="filter-label">Filter Urang Sesuku Berdasarkan Lokasi:</div>
            <select id="filter-lokasi" class="form-control" onchange="renderDunsanak()" style="padding: 6px 12px; font-size: 12px;">
                <option value="Semua">Semua Lokasi Dunsanak</option>
                <option value="Kampung">Mancari yang di Kampuang</option>
                <option value="Rantau">Mancari yang di Rantau</option>
            </select>
        </div>
        <div class="chat-list" id="dunsanak-container">
            <!-- Data Dunsanak dirender otomatis oleh JS -->
        </div>
    </div>

    <!-- SCREEN 3: SIMULASI ROOM CHAT PRIVAT -->
    <div id="screen-chat" class="screen">
        <div class="chat-room-header">
            <button class="btn-back-chat" onclick="kembaliKeDashboard()">🡨</button>
            <div class="avatar online" id="room-avatar" style="width:36px; height:36px; font-size:14px; margin-right:10px;">C</div>
            <div class="chat-room-meta">
                <div class="chat-room-title" id="room-title">Urang Sesuku</div>
                <div class="chat-room-sub" id="room-sub">Suku Chaniago · Online</div>
            </div>
        </div>
        <div class="message-area" id="message-container">
            <!-- Isi chat -->
        </div>
        <div class="input-bar">
            <input type="text" id="input-chat-text" placeholder="Ketik pasan di siko...">
            <button class="btn-send" onclick="kirimPasan()">➔</button>
        </div>
    </div>
</div>

<script>
    // Data Dummy Dunsanak Lintas Suku Minang
    const databaseDunsanak = [
        { nama: "Rian Chaniago", suku: "Chaniago", lokasi: "Rantau", kota: "Jakarta", pesan: "Ado info kost dakek kito sesuku sanak?", avatar: "👨", online: true },
        { nama: "Uda Sutan Koto", suku: "Koto", lokasi: "Kampung", kota: "Bukittinggi", pesan: "Rancak banar basuo sanak sakampuang di siko.", avatar: "👳", online: true },
        { nama: "Fitri Piliang", suku: "Piliang", lokasi: "Rantau", kota: "Bandung", pesan: "Barek samo dipikua, ringan samo dijinjiang.", avatar: "👩", online: false },
        { nama: "Ajo Hendra Bodi", suku: "Bodi", lokasi: "Kampung", kota: "Padang", pesan: "Dima posisi kini sanak?", avatar: "👨", online: true },
        { nama: "Dewi Melayu", suku: "Melayu", lokasi: "Rantau", kota: "Medan", pesan: "Salam silaturahmi dunsanak sa-Minang.", avatar: "👩", online: true },
        { nama: "Roni Jambak", suku: "Jambak", lokasi: "Kampung", kota: "Payakumbuh", pesan: "Maju taruih Ranji Siber kito!", avatar: "🧔", online: false },
        { nama: "Andi Sikumbang", suku: "Sikumbang", lokasi: "Rantau", kota: "Surabaya", pesan: "Dima bumi dipijak, di sinan langik dijujuang.", avatar: "👨", online: true }
    ];

    let userActiveProfile = { nama: "", suku: "Chaniago", lokasi: "Rantau" };
    let currentActiveTargetChat = null;

    function gantiScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function masukDashboard() {
        const inputNama = document.getElementById('user-name').value.trim();
        if(!inputNama) { alert("Isi namo sanak dulu!"); return; }
        
        userActiveProfile.nama = inputNama;
        userActiveProfile.suku = document.getElementById('user-suku').value;
        userActiveProfile.lokasi = document.getElementById('user-posisi').value;

        document.getElementById('user-profile-subtitle').innerText = `Klan Suku: ${userActiveProfile.suku.toUpperCase()}`;
        gantiScreen('screen-dashboard');
        renderDunsanak();
    }

    function renderDunsanak() {
        const container = document.getElementById('dunsanak-container');
        const filterLokasi = document.getElementById('filter-lokasi').value;
        container.innerHTML = "";

        // Filter dunsanak yang sesuku ATAU tampilkan dunsanak lain dengan badge indikator
        databaseDunsanak.forEach((dunsanak) => {
            if(filterLokasi !== "Semua" && dunsanak.lokasi !== filterLokasi) return;

            const isSesuku = dunsanak.suku.toLowerCase() === userActiveProfile.suku.toLowerCase();
            
            const item = document.createElement('div');
            item.className = 'chat-item';
            item.onclick = () => bukaRoomChat(dunsanak);

            item.innerHTML = `
                <div class="avatar ${dunsanak.online ? 'online' : ''}">${dunsanak.avatar}</div>
                <div class="chat-info">
                    <div class="chat-name-row">
                        <div class="chat-name">${dunsanak.nama} ${isSesuku ? '<span style="color:var(--minang-gold)">(Sesuku)</span>' : ''}</div>
                        <div class="chat-meta">Suku ${dunsanak.suku}</div>
                    </div>
                    <div class="chat-name-row">
                        <div class="chat-msg-preview">${dunsanak.pesan}</div>
                        <div class="chat-status-badge ${dunsanak.lokasi.toLowerCase()}">${dunsanak.lokasi === 'Rantau' ? '✈ Rantau ('+dunsanak.kota+')' : '🏡 Kampung'}</div>
                    </div>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function bukaRoomChat(dunsanak) {
        currentActiveTargetChat = dunsanak;
        document.getElementById('room-avatar').innerText = dunsanak.avatar;
        document.getElementById('room-title').innerText = dunsanak.nama;
        document.getElementById('room-sub').innerText = `Suku ${dunsanak.suku} · ${dunsanak.lokasi === 'Rantau' ? 'Merantau di ' + dunsanak.kota : 'Di Kampung Halaman'}`;
        
        const msgContainer = document.getElementById('message-container');
        msgContainer.innerHTML = `
            <div class="msg-bubble incoming">
                Aparancak sanak! Ambo ${dunsanak.nama} dari suku ${dunsanak.suku}. Silaturahmi kito badunsanak.
                <div class="msg-time">02:14</div>
            </div>
            <div class="msg-bubble incoming">
                ${dunsanak.pesan}
                <div class="msg-time">02:15</div>
            </div>
        `;
        gantiScreen('screen-chat');
    }

    function kembaliKeDashboard() {
        gantiScreen('screen-dashboard');
    }

    function kirimPasan() {
        const inputElement = document.getElementById('input-chat-text');
        const text = inputElement.value.trim();
        if(!text) return;

        const msgContainer = document.getElementById('message-container');
        const waktuNow = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

        const bubbleOut = document.createElement('div');
        bubbleOut.className = 'msg-bubble outgoing';
        bubbleOut.innerHTML = `${text} <div class="msg-time">${waktuNow}</div>`;
        msgContainer.appendChild(bubbleOut);
        
        inputElement.value = "";
        msgContainer.scrollTop = msgContainer.scrollHeight;

        // Simulasi Balasan Bot Otomatis Dunsanak Minang
        setTimeout(() => {
            const bubbleIn = document.createElement('div');
            bubbleIn.className = 'msg-bubble incoming';
            bubbleIn.innerHTML = `Siapp sanak, tarimo kasih pasan-nyo. Taruih jago kekompakan Suku ${currentActiveTargetChat.suku} kito! 💪👑 <div class="msg-time">${waktuNow}</div>`;
            msgContainer.appendChild(bubbleIn);
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }, 1500);
    }
</script>
</body>
</html>
